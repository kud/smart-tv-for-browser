<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>smartTV Home — Settings</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font:
          15px system-ui,
          -apple-system,
          sans-serif;
        background: #06060a;
        color: #f5f5f7;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      p {
        color: #9b9ba6;
        margin: 0 0 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #9b9ba6;
      }
      input {
        width: 100%;
        max-width: 420px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #2a2a33;
        background: #14141a;
        color: #f5f5f7;
        font: inherit;
      }
      button {
        margin-top: 16px;
        padding: 10px 20px;
        border: 0;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        font: 600 15px system-ui;
        cursor: pointer;
      }
      #status {
        margin-left: 12px;
        color: #34d399;
      }
      .toggle {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        max-width: 460px;
        margin-top: 28px;
        color: #f5f5f7;
      }
      .toggle input {
        width: auto;
        margin-top: 3px;
      }
      .toggle .hint {
        color: #9b9ba6;
        margin: 4px 0 0;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>smartTV</h1>
    <p>Where should the Home button take you?</p>
    <label for="homeUrl">smartTV URL</label>
    <input
      id="homeUrl"
      type="url"
      placeholder="https://smart-tv.kud.io/"
      autocomplete="off"
    />

    <label class="toggle">
      <input id="ytTvMode" type="checkbox" />
      <span>
        YouTube TV mode
        <span class="hint"
          >Spoof a TV user-agent on <b>youtube.com/tv</b> so it serves the
          leanback TV interface. Plain youtube.com stays classic.</span
        >
      </span>
    </label>

    <label class="toggle">
      <input id="debug" type="checkbox" />
      <span>
        Debug logging
        <span class="hint"
          >Log the remote event chain to the page console (prefixed
          <b>[smartTV]</b>) to diagnose issues on a site.</span
        >
      </span>
    </label>

    <div>
      <button id="save">Save</button>
      <span id="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
